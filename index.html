<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Special for You</title>
    <style>
        body, html {
            margin: 0; padding: 0;
            height: 100%; font-family: 'Arial', sans-serif;
            background-color: #111; color: white;
            overflow: hidden;
        }

        /* Layar Password */
        #pass-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 999;
        }

        input {
            padding: 12px; border-radius: 8px; border: none;
            margin-top: 15px; text-align: center; font-size: 16px;
        }

        button {
            margin-top: 15px; padding: 10px 25px; border-radius: 20px;
            border: none; background: #e21d24; color: white;
            font-weight: bold; cursor: pointer;
        }

        /* Konten Utama */
        #main-content {
            display: none; height: 100%; width: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNHJndXp4bmZqbmZqbmZqbmZqbmZqbmZqbmZqbmZqbmZqbmZq/l41lTjJp6zH6H6Y6S/giphy.gif'); /* Animasi Background */
            background-size: cover; background-position: center;
            flex-direction: column; justify-content: center; align-items: center;
            text-align: center;
        }

        .floating-nailong {
            position: absolute; width: 150px; z-index: -1;
            animation: float 6s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(50px, -100px) rotate(15deg); }
        }

        .photo-gallery img {
            width: 120px; height: 120px; object-fit: cover;
            border: 3px solid white; border-radius: 15px;
            margin: 10px; animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 { font-size: 2.5rem; text-shadow: 2px 2px #e21d24; }
        p { padding: 0 20px; font-style: italic; }
    </style>
</head>
<body>

    <!-- Layar Password -->
    <div id="pass-screen">
        <h2>Masukkan Tanggal Lahir (DDMMYYYY)</h2>
        <p style="font-size: 0.8rem; color: #666;">Contoh: 28052007</p>
        <input type="password" id="inputPass" placeholder="Klik di sini...">
        <button onclick="checkPass()">Buka Kejutan</button>
    </div>

    <!-- Konten Utama -->
    <div id="main-content">
        <!-- Tambahkan Gambar Nailong Lucu dari Internet -->
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXN3bmZndmYyeXBoYmtvbmZ0bmZqbmZqbmZqbmZqbmZqbmZq/3o7TKVUn7iM8FMEU24/giphy.gif" class="floating-nailong" style="top: 10%; left: 10%;">
        <img src="https://media.giphy.com/media/v1.Y2lkPTc5MGI3NjExNXN3bmZndmYyeXBoYmtvbmZ0bmZqbmZqbmZqbmZqbmZqbmZq/3o7TKVUn7iM8FMEU24/giphy.gif" class="floating-nailong" style="bottom: 10%; right: 10%;">

        <h1>Happy Birthday! ❤️</h1>
        
        <div class="photo-gallery">
            <!-- Ganti src dengan link foto kalian atau nama file foto di GitHub -->
            <img src="https://via.placeholder.com/150" alt="Foto 1">
            <img src="https://via.placeholder.com/150" alt="Foto 2">
            <img src="https://via.placeholder.com/150" alt="Foto 3">
        </div>

        <p id="teks-romantis">"So long and goodnight... eh, maksudnya selamat ulang tahun! <br> Semoga bahagia terus ya, Nailong-ku!"</p>
    </div>

    <!-- Audio MCR Helena (Ganti link jika punya file mp3 sendiri) -->
    <audio id="lagu" loop>
        <source src="https://www.myinstants.com/media/sounds/my-chemical-romance-helena-official-music-video.mp3" type="audio/mpeg">
    </audio>

    <script>
        function checkPass() {
            const pass = document.getElementById('inputPass').value;
            // GANTI '15052003' dengan tanggal lahir dia yang asli
            if (pass === '15052003') {
                document.getElementById('pass-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'flex';
                document.getElementById('lagu').play();
                createRain();
            } else {
                alert('Ups! Tanggal lahirnya salah, coba lagi ya sayang.');
            }
        }

        // Efek hujan hati/bintang
        function createRain() {
            setInterval(() => {
                const heart = document.createElement('div');
                heart.innerHTML = '✨';
                heart.style.position = 'fixed';
                heart.style.left = Math.random() * 100 + 'vw';
                heart.style.top = '-20px';
                heart.style.fontSize = Math.random() * 20 + 10 + 'px';
                heart.style.transition = '5s linear';
                document.body.appendChild(heart);

                setTimeout(() => {
                    heart.style.transform = `translateY(${window.innerHeight + 50}px)`;
                }, 100);

                setTimeout(() => { heart.remove(); }, 5100);
            }, 200);
        }
    </script>
</body>
</html>
